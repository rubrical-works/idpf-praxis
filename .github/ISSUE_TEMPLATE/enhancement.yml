name: Enhancement
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion. Please describe the enhancement you'd like to see.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the enhancement.
      placeholder: What would you like to see added or improved?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this enhancement useful? What problem does it solve?
      placeholder: Describe the use case or pain point this addresses.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? Include examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information (screenshots, related issues, references).
    validations:
      required: false
